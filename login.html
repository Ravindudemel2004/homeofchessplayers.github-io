<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Home of Chess Players</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: #f8f9fa;
        }
        
        .auth-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #7f8c8d;
        }
        
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        
        .auth-form label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .auth-form input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .auth-form input:focus {
            border-color: #3498db;
            outline: none;
        }
        
        .auth-form .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .auth-error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
        
        .auth-debug {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #ffc107;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        
        .auth-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-container">
                <div class="logo">
                    <i class="fas fa-users"></i>
                    <h1>HOME OF CHESS<span>PLAYERS</span></h1>
                </div>
                <nav class="main-nav">
                    <ul>
                        <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
                        <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
                        <li><a href="membership.html"><i class="fas fa-id-card"></i> Membership</a></li>
                        <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a></li>
                        <li><a href="learn.html"><i class="fas fa-graduation-cap"></i> Learn</a></li>
                        <li><a href="tournament.html"><i class="fas fa-trophy"></i> Tournament</a></li>
                        <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                    </ul>
                </nav>
                <button class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
                <p>Sign in to your chess account</p>
            </div>
            
            <!-- Debug Info -->
            <div id="debug-info" class="auth-debug">
                <strong>Debug Info:</strong><br>
                Firebase: <span id="firebase-status">Loading...</span><br>
                Auth: <span id="auth-status">Loading...</span><br>
                Current User: <span id="user-status">Checking...</span>
            </div>
            
            <div id="login-error" class="auth-error"></div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                <p><a href="home.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Configuration - YOUR CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDiSc1n78BWCClIiWlRKPdJSMNG7GWZ8Ag",
            authDomain: "home-of-chess-players.firebaseapp.com",
            projectId: "home-of-chess-players",
            storageBucket: "home-of-chess-players.appspot.com",
            messagingSenderId: "966734153213",
            appId: "1:966734153213:web:b8523fdf90c090f94d8594"
        };

        // Debug elements
        const firebaseStatus = document.getElementById('firebase-status');
        const authStatus = document.getElementById('auth-status');
        const userStatus = document.getElementById('user-status');
        const errorDiv = document.getElementById('login-error');

        try {
            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            
            firebaseStatus.textContent = '✅ Loaded';
            firebaseStatus.style.color = '#27ae60';
            
            authStatus.textContent = '✅ Ready';
            authStatus.style.color = '#27ae60';
            
            // Check current user
            auth.onAuthStateChanged(user => {
                if (user) {
                    userStatus.textContent = `✅ Logged in as ${user.email}`;
                    userStatus.style.color = '#27ae60';
                    console.log('User already logged in:', user.email);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    userStatus.textContent = '❌ Not logged in';
                    userStatus.style.color = '#e74c3c';
                }
            });
            
            // Login Form Handler
            document.getElementById('login-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = this.querySelector('button[type="submit"]');
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                errorDiv.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
                
                console.log('Attempting login with:', email);
                
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    console.log('✅ Login successful:', userCredential.user.email);
                    
                    errorDiv.style.background = '#d4edda';
                    errorDiv.style.color = '#155724';
                    errorDiv.textContent = '✅ Login successful! Redirecting...';
                    errorDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } catch (error) {
                    console.error('❌ Login failed:', error.code, error.message);
                    
                    let errorMessage = getErrorMessage(error.code);
                    errorMessage += `<br><br><strong>Debug:</strong> ${error.code}`;
                    
                    errorDiv.innerHTML = errorMessage;
                    errorDiv.style.background = '#fee';
                    errorDiv.style.color = '#c33';
                    errorDiv.style.display = 'block';
                    
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            });
            
        } catch (error) {
            console.error('Firebase initialization error:', error);
            firebaseStatus.textContent = '❌ Error: ' + error.message;
            firebaseStatus.style.color = '#e74c3c';
            
            authStatus.textContent = '❌ Failed';
            authStatus.style.color = '#e74c3c';
            
            errorDiv.innerHTML = `<strong>Firebase Error:</strong> ${error.message}<br><br>Please check console (F12) for details.`;
            errorDiv.style.display = 'block';
        }

        // Helper function
        function getErrorMessage(errorCode) {
            switch(errorCode) {
                case 'auth/user-not-found':
                    return '❌ No account found with this email. Please sign up first.';
                case 'auth/wrong-password':
                    return '❌ Incorrect password. Please try again.';
                case 'auth/invalid-email':
                    return '❌ Invalid email address.';
                case 'auth/user-disabled':
                    return '❌ This account has been disabled.';
                case 'auth/too-many-requests':
                    return '❌ Too many failed attempts. Please try again later.';
                case 'auth/operation-not-allowed':
                    return '❌ Email/password sign-in is not enabled. Contact admin.';
                default:
                    return '❌ Failed to sign in. Please try again.';
            }
        }
    </script>
</body>
</html>
