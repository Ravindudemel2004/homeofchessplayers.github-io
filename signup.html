<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Home of Chess Players</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: #f8f9fa;
        }
        .auth-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3498db;
            color: white;
            font-weight: 600;
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .auth-error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .auth-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .debug-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .debug-box .ok { color: #27ae60; }
        .debug-box .error { color: #e74c3c; }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .auth-footer a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-container">
                <div class="logo">
                    <i class="fas fa-users"></i>
                    <h1>HOME OF CHESS<span>PLAYERS</span></h1>
                </div>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-user-plus"></i> Create Account</h1>
                <p>Join our chess community today!</p>
            </div>
            
            <div class="debug-box">
                <strong>System Status:</strong><br>
                Firebase: <span id="fb-status">⏳ Loading...</span><br>
                Auth: <span id="auth-status">⏳ Loading...</span><br>
                Firestore: <span id="fs-status">⏳ Loading...</span>
            </div>
            
            <div id="signup-error" class="auth-error"></div>
            <div id="signup-success" class="auth-success"></div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullname" required placeholder="Your name">
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="email@example.com">
                </div>
                
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirm-password" required placeholder="Re-enter password">
                </div>
                
                <div class="form-group">
                    <label>Chess Skill Level *</label>
                    <select id="skill-level" required>
                        <option value="">Select level</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Membership *</label>
                    <select id="membership" required>
                        <option value="free">Free Member</option>
                        <option value="premium">Premium ($10/month)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have account? <a href="login.html">Sign In</a></p>
                <p><a href="home.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (CDN Version - Works on GitHub Pages) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDiSc1n78BWCClIiWlRKPdJSMNG7GWZ8Ag",
            authDomain: "home-of-chess-players.firebaseapp.com",
            projectId: "home-of-chess-players",
            storageBucket: "home-of-chess-players.appspot.com",
            messagingSenderId: "966734153213",
            appId: "1:966734153213:web:b8523fdf90c090f94d8594"
        };

        // Debug elements
        const fbStatus = document.getElementById('fb-status');
        const authStatus = document.getElementById('auth-status');
        const fsStatus = document.getElementById('fs-status');
        const errorDiv = document.getElementById('signup-error');
        const successDiv = document.getElementById('signup-success');

        try {
            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            
            // Update debug status
            fbStatus.textContent = '✅ OK';
            fbStatus.className = 'ok';
            authStatus.textContent = '✅ OK';
            authStatus.className = 'ok';
            fsStatus.textContent = '✅ OK';
            fsStatus.className = 'ok';
            
            console.log('✅ Firebase initialized successfully');

            // Form submission
            document.getElementById('signup-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = this.querySelector('button');
                
                // Get form values
                const fullname = document.getElementById('fullname').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const skillLevel = document.getElementById('skill-level').value;
                const membership = document.getElementById('membership').value;
                
                // Reset messages
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
                
                // Validate passwords
                if (password !== confirmPassword) {
                    errorDiv.textContent = '❌ Passwords do not match!';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                // Show loading
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
                
                console.log('📝 Starting signup for:', email);
                
                try {
                    // Step 1: Create Authentication User
                    console.log('1️⃣ Creating authentication user...');
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    console.log('✅ Auth user created:', user.uid);
                    
                    // Step 2: Create Firestore Document
                    console.log('2️⃣ Creating Firestore profile...');
                    const memberData = {
                        fullname: fullname,
                        email: email,
                        skillLevel: skillLevel,
                        membership: membership,
                        phone: '',
                        status: 'active',
                        joinDate: firebase.firestore.FieldValue.serverTimestamp(),
                        createdAt: new Date().toISOString()
                    };
                    
                    await db.collection('members').doc(user.uid).set(memberData);
                    console.log('✅ Firestore profile created successfully');
                    
                    // Step 3: Verify document was created
                    console.log('3️⃣ Verifying profile...');
                    const doc = await db.collection('members').doc(user.uid).get();
                    if (!doc.exists) {
                        throw new Error('Profile verification failed - document not found');
                    }
                    console.log('✅ Profile verified - document exists');
                    
                    // Success!
                    console.log('✅ Signup complete!');
                    successDiv.textContent = '✅ Account created successfully! Redirecting to dashboard...';
                    successDiv.style.display = 'block';
                    
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                    
                } catch (error) {
                    console.error('❌ Signup error:', error.code, error.message);
                    
                    let errorMsg = '❌ ';
                    
                    if (error.code === 'auth/email-already-in-use') {
                        errorMsg += 'This email is already registered. Please sign in instead.';
                    } else if (error.code === 'auth/weak-password') {
                        errorMsg += 'Password must be at least 6 characters.';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMsg += 'Invalid email address.';
                    } else if (error.code === 'firestore/permission-denied') {
                        errorMsg += 'Firestore permission denied. Please update security rules.';
                    } else if (error.code === 'firestore/unavailable') {
                        errorMsg += 'Firestore is unavailable. Please try again.';
                    } else {
                        errorMsg += 'Failed to create account. Check console for details.';
                    }
                    
                    errorDiv.innerHTML = errorMsg;
                    errorDiv.style.display = 'block';
                    
                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            });
            
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            fbStatus.textContent = '❌ Error';
            fbStatus.className = 'error';
            
            errorDiv.innerHTML = `<strong>Firebase Error:</strong> ${error.message}<br><br>Check console (F12) for details.`;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
